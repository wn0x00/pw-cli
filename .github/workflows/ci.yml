name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  verify:
    name: Verify on Node.js ${{ matrix.node }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node:
          - 18
          - 20
          - 22

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Show tool versions
        run: |
          node -v
          npm -v

      - name: Verify package
        run: npm run verify

      - name: Dry-run package build
        run: npm pack --dry-run
